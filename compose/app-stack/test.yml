# defining the services

services:
  web:
    build: ./web
    container_name: ninjaweb
    ports: 
      - "5000:5000"
    environment: 
      DB_HOST: db
      POSTGRES_DB: ninjadb
      POSTGRES_USER: ninja
      POSTGRES_PASSWORD: testing123
      REDIS_HOST: cache
    depends_on:
      db:
       condition: service_healthy
      cache:
        condition: service_started
    restart: on-failure
      

  db:
    image: postgres:17-alpine
    container_name: mydb
    restart: always
    environment:
      POSTGRES_DB:  ninjadb
      POSTGRES_USER: ninja
      POSTGRES_PASSWORD: testing123
    volumes:
      - thordata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ninja -d ninjadb"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    image: redis:latest
    container_name: ninjared

volumes:
  thordata:















